<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CricScore Pro - Venky Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

<div id="app-container">
    <div id="wicket-overlay" class="wicket-anim" style="display: none;">
        <div class="anim-content"><h1 class="out-text">OUT</h1></div>
    </div>

    <div id="setup-screen" class="screen active">
        <div class="header-main">CricScore Pro</div>
        <div class="padding-20">
            <div class="setup-card">
                <h3><i class="fas fa-trophy"></i> Match Details</h3>
                <input type="text" id="t1Name" placeholder="Team 1 Name" class="modern-input">
                <input type="text" id="t2Name" placeholder="Team 2 Name" class="modern-input">
                <input type="number" id="matchOvers" placeholder="Total Overs" value="5" class="modern-input">
            </div>

            <div class="setup-card">
                <h3><i class="fas fa-coins"></i> Toss & Choice</h3>
                <select id="tossWinner" class="modern-input">
                    <option value="">Who won the toss?</option>
                    <option value="t1">Team 1</option>
                    <option value="t2">Team 2</option>
                </select>
                <select id="tossChoice" class="modern-input">
                    <option value="Batting">Elected to Bat</option>
                    <option value="Bowling">Elected to Bowl</option>
                </select>
            </div>

            <div class="setup-card">
                <h3><i class="fas fa-users"></i> Opening Players</h3>
                <input type="text" id="initStriker" placeholder="Striker Name" class="modern-input">
                <input type="text" id="initNonStriker" placeholder="Non-Striker Name" class="modern-input">
                <input type="text" id="initBowler" placeholder="Opening Bowler" class="modern-input">
            </div>
            
            <button class="primary-btn" onclick="startLiveMatch()">Start Match <i class="fas fa-play"></i></button>
        </div>
    </div>

    <div id="main-screen" class="screen" style="display: none;">
        <div class="header-match">
            <span id="topMatchTitle">Live Match</span>
            <div class="live-indicator"><span class="dot"></span> LIVE</div>
        </div>
        
        <div class="tabs-nav">
            <button class="tab-link active" id="tab-live-btn" onclick="switchTab('live')">LIVE SCORE</button>
            <button class="tab-link" id="tab-score-btn" onclick="switchTab('score')">SCOREBOARD</button>
        </div>

        <div id="view-live" class="tab-content active">
            <div class="partnership-card">
                <i class="fas fa-handshake"></i> Partnership: <b id="currentPartnership">0 (0)</b>
            </div>

            <div class="scoreboard-card">
                <div class="team-info" id="battingTeamText">Team Name</div>
                <div class="score-row">
                    <span class="big-score"><span id="mainRuns">0</span>-<span id="mainWkts">0</span></span>
                    <span class="overs-badge">(<span id="mainOvers">0.0</span>)</span>
                </div>
                <div id="targetDisplay" class="target-text"></div>
            </div>

            <div class="balls-wrapper">
                <div class="ball-label">THIS OVER:</div>
                <div class="this-over-horizontal" id="thisOverBalls"></div>
            </div>

            <div class="player-stats-container">
                <table class="modern-table">
                    <thead>
                        <tr><th>BATSMAN</th><th>R</th><th>B</th><th>4s/6s</th><th>SR</th></tr>
                    </thead>
                    <tbody>
                        <tr id="row-striker" class="active-batter">
                            <td><span id="lsName"></span>*</td>
                            <td id="lsR" class="bold-val">0</td>
                            <td id="lsB">0</td>
                            <td><span id="ls4">0</span>/<span id="ls6">0</span></td>
                            <td><b id="lsSR">0.0</b></td>
                        </tr>
                        <tr id="row-nonStriker">
                            <td><span id="lnsName"></span></td>
                            <td id="lnsR" class="bold-val">0</td>
                            <td id="lnsB">0</td>
                            <td><span id="lns4">0</span>/<span id="lns6">0</span></td>
                            <td><b id="lnsSR">0.0</b></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="bowler-live-card">
                <div class="b-info"><i class="fas fa-baseball-ball"></i> <span id="lbName">Bowler</span></div>
                <div class="b-stats">O: <b id="lbO">0.0</b> | R: <b id="lbR">0</b> | W: <b id="lbW">0</b></div>
            </div>

            <div class="keypad-grid">
                <button class="run-btn" onclick="addRun(0)">0</button>
                <button class="run-btn" onclick="addRun(1)">1</button>
                <button class="run-btn" onclick="addRun(2)">2</button>
                <button class="run-btn" onclick="addRun(3)">3</button>
                <button class="run-btn" onclick="addRun(4)">4</button>
                <button class="run-btn" onclick="addRun(6)">6</button>
                <button class="util-btn" onclick="addExtra('WD')">WD</button>
                <button class="util-btn" onclick="openNBModal()">NB</button>
                <button class="out-btn" onclick="openWicketMenu()">OUT</button>
                <button class="util-btn" onclick="swapStrike()">SWAP</button>
                <button class="undo-btn" onclick="undo()"><i class="fas fa-undo"></i></button>
                <button class="util-btn end-inn-btn" onclick="manualEndInnings()" style="background: #e74c3c; color: white; font-weight: bold;">END INN</button>
            </div>
        </div>

        <div id="view-score" class="tab-content">
            <div class="padding-10">
                <div id="full-scoreboard"></div>
                <div id="mom-section" class="mom-card" style="display:none;">
                    <h3><i class="fas fa-star"></i> Man of the Match</h3>
                    <div id="mom-name">---</div>
                </div>
            </div>
        </div>
    </div>

    <div id="wicket-select-modal" class="modal-blur">
        <div class="modal-box">
            <h3>Wicket Fall</h3>
            <select id="wicketTypeSelect" class="modern-input" onchange="toggleRunOutFields()">
                <option value="Bowled">Bowled</option>
                <option value="Caught">Caught</option>
                <option value="LBW">LBW</option>
                <option value="Run Out">Run Out</option>
                <option value="Stumped">Stumped</option>
            </select>
            <div id="runout-fields" style="display:none;">
                <label>Who got out?</label>
                <select id="whoIsOut" class="modern-input">
                    <option value="striker">Striker</option>
                    <option value="nonStriker">Non-Striker</option>
                </select>
                <label>Runs completed:</label>
                <input type="number" id="runsCompleted" class="modern-input" value="0">
            </div>
            <input type="text" id="nextBatterName" placeholder="Next Batter Name" class="modern-input">
            <button class="primary-btn" onclick="submitWicketFinal()">Confirm Out</button>
            <button onclick="closeModal('wicket-select-modal')" class="cancel-btn">Cancel</button>
        </div>
    </div>

    <div id="nb-modal" class="modal-blur">
        <div class="modal-box">
            <h3>No Ball - Batter Runs?</h3>
            <div class="runs-grid">
                <button onclick="submitNB(0)">0</button>
                <button onclick="submitNB(1)">1</button>
                <button onclick="submitNB(2)">2</button>
                <button onclick="submitNB(3)">3</button>
                <button onclick="submitNB(4)">4</button>
                <button onclick="submitNB(6)">6</button>
            </div>
            <button onclick="closeModal('nb-modal')" class="cancel-btn">Cancel</button>
        </div>
    </div>

    <div id="innings-break-modal" class="modal-blur">
        <div class="modal-box">
            <h2 style="color: #2c3e50;">Innings Break</h2>
            <p id="inningsSummaryText" style="font-weight: bold; font-size: 1.1rem;"></p>
            <h3 id="targetText" style="color: #e74c3c;"></h3>
            <button class="primary-btn" onclick="setupSecondInnings()">Start 2nd Innings <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <div id="bowler-select-modal" class="modal-blur">
        <div class="modal-box">
            <h3>Select Next Bowler</h3>
            <div id="prevBowlersList" style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 15px;"></div>
            <input type="text" id="newBowlerName" placeholder="Or Enter New Bowler" class="modern-input">
            <button class="primary-btn" onclick="submitBowlerModal()">Continue Over</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
